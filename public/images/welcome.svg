<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Welcome blog cover</title>
  <desc id="desc">A calm editorial cover with glass cards and soft blue light.</desc>
  <defs>
